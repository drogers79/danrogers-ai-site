<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Call — Dan Rogers AI Consulting | Williamsburg, VA</title>
  <meta name="description" content="Book a free 20-minute intro call or an AI Opportunity Assessment with Dan Rogers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .contact-hero {
      padding: 10rem 2rem 4rem;
      text-align: center;
    }

    .contact-hero h1 {
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      max-width: 640px;
      margin: 0 auto 1.25rem;
    }

    .contact-hero p {
      font-size: 1.05rem;
      color: var(--gray-300);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* BOOKING BLOCKS */
    .booking-block {
      background: #f8f9fb;
      border-top: 1px solid #e5e7eb;
      padding: 4rem 2rem 5rem;
    }

    .booking-block + .booking-block {
      border-top: 2px solid #e5e7eb;
    }

    .booking-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .booking-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 0.75rem;
    }

    .booking-tag.free {
      color: #059669;
      background: #d1fae5;
      border: 1px solid #6ee7b7;
    }

    .booking-tag.paid {
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid rgba(59,130,246,0.3);
    }

    .booking-heading {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0a0f1e;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }

    .booking-subtext {
      font-size: 0.95rem;
      color: #4b5563;
      margin-bottom: 2rem;
      line-height: 1.65;
      max-width: 640px;
    }

    .booking-wrap {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .booking-wrap iframe {
      display: block;
    }

    /* EMAIL FALLBACK */
    .email-section {
      background: var(--navy-mid);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 3rem 2rem;
      text-align: center;
    }

    .email-section p {
      font-size: 0.95rem;
      color: var(--gray-400);
    }

    .email-section a {
      color: var(--accent-bright);
    }

    .assessment-cta-wrap {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .assessment-details {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .assessment-detail-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .assessment-detail-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .assessment-detail-item strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0a0f1e;
      margin-bottom: 0.2rem;
    }

    .assessment-detail-item p {
      font-size: 0.85rem;
      color: #4b5563;
      line-height: 1.55;
      margin: 0;
    }

    .assessment-book-btn {
      display: inline-block;
      margin-bottom: 0.6rem;
    }

    .assessment-note {
      font-size: 0.78rem;
      color: #9ca3af;
      margin: 0;
    }

    @media (max-width: 640px) {
      .booking-block {
        padding: 3rem 1.25rem 3rem;
      }
      .assessment-cta-wrap {
        padding: 1.75rem 1.25rem;
      }
    }
  </style>
</head>

    <p>

      Already know you want the Assessment? Go straight to booking it below.
    </p>
  </section>
