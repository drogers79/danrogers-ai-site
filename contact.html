<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Call — Dan Rogers AI Consulting | Williamsburg, VA</title>
  <meta name="description" content="Book a free 20-minute intro call or go straight to booking an AI Opportunity Assessment with Dan Rogers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .contact-hero {
      padding: 10rem 2rem 3rem;
      text-align: center;
    }

    .contact-hero h1 {
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      max-width: 640px;
      margin: 0 auto 1.25rem;
    }

    .contact-hero p {
      font-size: 1.05rem;
      color: var(--gray-300);
      max-width: 520px;
      margin: 0 auto 2.5rem;
      line-height: 1.75;
    }

    /* OPTION TOGGLE */
    .booking-toggle {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 2rem 2rem;
    }

    .toggle-btn {
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--gray-300);
    }

    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }

    .toggle-btn:hover:not(.active) {
      border-color: var(--accent-bright);
      color: var(--white);
    }

    /* BOOKING SECTIONS */
    .booking-section {
      padding: 0;
      background: #f8f9fb;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .booking-section.active {
      max-height: 1400px;
    }

    .booking-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    .booking-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .booking-heading {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0a0f1e;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .booking-subtext {
      font-size: 0.9rem;
      color: #4b5563;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .booking-wrap {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .booking-wrap iframe {
      display: block;
    }

    /* WHAT TO EXPECT */
    .expect-section {
      background: #f8f9fb;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 0 4rem;
    }

    .what-to-expect {
      max-width: 960px;
      margin: 2rem auto 0;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .expect-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1.1rem 1.25rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    .expect-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .expect-item h4 {
      font-size: 0.875rem;
      font-weight: 700;
      color: #0a0f1e;
      margin-bottom: 0.2rem;
    }

    .expect-item p {
      font-size: 0.8rem;
      color: #4b5563;
      line-height: 1.55;
    }

    .expect-item a {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .booking-inner {
        padding: 3rem 1.25rem 3rem;
      }
      .what-to-expect {
        padding: 0 1.25rem;
      }
    }
  </style>
</head>
